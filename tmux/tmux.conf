# ==========================================
# BASIC SETTINGS
# ==========================================

# Change prefix from Ctrl-b to Ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Better mouse mode plugin configurations
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-speed-num-lines-per-scroll 1
set -g @scroll-down-exit-copy-mode "on"
set -g @scroll-in-moused-over-pane "on"
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Maximum scrollback buffer size
set -g history-limit 999999999

# Enable 256 colors with true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable focus events for autoread in Neovim
set-option -g focus-events on

# Faster key repetition / escape time
set -s escape-time 0
set -g repeat-time 600

# Better display settings
set -g display-panes-time 2000
set -g display-time 2000
set -g status-interval 5

# ==========================================
# ENHANCED NAVIGATION & SPLITS
# ==========================================

# Pane splitting (using current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows use current path
bind c new-window -c "#{pane_current_path}"

# Alt-Arrow pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation (Alt + hjkl)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Enhanced pane resizing (Repeatable Ctrl + Arrows)
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# Additional Vim-style resizing (Repeatable Shift + hjkl)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Window switching (Alt + Ctrl + Number or Prefix + Number)
bind -n M-C-1 select-window -t 1
bind -n M-C-2 select-window -t 2
bind -n M-C-3 select-window -t 3
bind -n M-C-4 select-window -t 4
bind -n M-C-5 select-window -t 5

bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# Enhanced window navigation
bind -n M-H previous-window
bind -n M-L next-window
bind Tab last-window
bind b previous-window

# ==========================================
# SESSION & PANE MANAGEMENT
# ==========================================

# Pane maximization toggle
bind z run-shell 'tmux list-panes -F "#F" | grep -q Z && tmux resize-pane -Z || tmux resize-pane -Z'

# Session management
bind C-c new-session
bind C-f command-prompt -p "Find-session:" "switch-client -t '%%'"
bind BTab switch-client -l

# Pane swapping
bind < swap-pane -D
bind > swap-pane -U

# Window swapping
bind -r C-S-H swap-window -t -1 \; select-window -t -1
bind -r C-S-L swap-window -t +1 \; select-window -t +1

# Mouse toggle keybind
bind m run-shell 'tmux show-options -g mouse | grep -q "on" && tmux set-option -g mouse off \; display-message "Mouse: OFF" || tmux set-option -g mouse on \; display-message "Mouse: ON"'

# Clear screen and history
bind -n C-l send-keys C-l \; run-shell 'sleep 0.1' \; clear-history

# ==========================================
# ENHANCED COPY MODE (VIM STYLE)
# ==========================================

setw -g queue-keys vi
set -g mode-keys vi
set-option -g set-clipboard off

bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# macOS Clipboard support via pbcopy
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Buffer management
bind B list-buffers
bind p paste-buffer -p
bind P choose-buffer

# ==========================================
# THEME & STATUS BAR (Orange & Dark Theme)
# ==========================================

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#1e1e1e,fg=#d4d4d4'

set -g status-left-length 30
set -g status-right-length 100

# Left status: session name
set -g status-left '#[fg=#ff6b35,bold] #S #[fg=#666666]| '

# Right status: user@host, date, and time
set -g status-right '#[fg=#666666]#(whoami)@#h #[fg=#ff6b35]| #[fg=#d4d4d4]%Y-%m-%d %H:%M '

# Window status format
set -g window-status-format '#[fg=#888888] #I:#W '
set -g window-status-current-format '#[fg=#ff6b35,bold] #I:#W#{?window_zoomed_flag,🔍,} '

# Pane borders
set -g pane-border-style 'fg=#444444'
set -g pane-active-border-style 'fg=#ff6b35'

# Message styling
set -g message-style 'bg=#ff6b35,fg=#000000,bold'
set -g message-command-style 'bg=#ff6b35,fg=#000000,bold'

# ==========================================
# CONFIGURATION MANAGEMENT
# ==========================================

# Config reload with feedback (points to standard default target ~/.tmux.conf)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux configuration reloaded!"

# Quick config editing
bind e new-window -n "tmux-config" '${EDITOR:-vi} ~/.tmux.conf'

# ==========================================
# QUALITY OF LIFE & MONITORING
# ==========================================

setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string 'tmux: #S : #W'

# Activity monitoring
setw -g monitor-activity on
set -g activity-action other
set -g visual-activity off
set -g visual-bell off

# Better search in copy mode
bind -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Quick pane selection overview
bind a display-panes -d 2000

# Synchronize panes toggle
bind S set-window-option synchronize-panes \; display-message "Synchronize panes toggle!"

# ==========================================
# PLUGINS (TPM)
# ==========================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
